<!-- CSRF Token -->
<meta name="csrf-token" content="{{ csrf_token() }}">

<script>
  // Expose update repo to frontend
  window.UPDATE_REPO = "{{ update_repo }}";

  // Auto-inject CSRF token into all mutating fetch requests
  (function() {
      const originalFetch = window.fetch;
      window.fetch = function(url, options) {
          options = options || {};
          const method = (options.method || 'GET').toUpperCase();
          if (['POST', 'PUT', 'DELETE', 'PATCH'].includes(method)) {
              const token = document.querySelector('meta[name="csrf-token"]');
              if (token) {
                  options.headers = options.headers || {};
                  // Support both Headers object and plain object
                  if (options.headers instanceof Headers) {
                      options.headers.set('X-CSRFToken', token.content);
                  } else {
                      options.headers['X-CSRFToken'] = token.content;
                  }
              }
          }
          return originalFetch.call(this, url, options);
      };
  })();
</script>
