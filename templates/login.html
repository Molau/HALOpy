<!DOCTYPE html>
<html lang="{{ lang() }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HALOpy Login</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}?v={{ static_version }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='fonts/bootstrap-icons/bootstrap-icons.css') }}?v={{ static_version }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}?v={{ static_version }}" rel="stylesheet">
    <style>
        /* Grayed-out background with header and menu */
        .background-content {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Login modal overlay */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            position: relative;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #0d6efd;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .language-buttons {
            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>
    <!-- Background: Normal header and menu (grayed out) -->
    <div class="background-content">
        {% include 'header.html' %}
        
        <div class="container-fluid mt-4">
            <div class="text-center text-muted">
                <h2>{{ g.i18n.get('app.welcome_title') }}</h2>
                <p>{{ g.i18n.get('app.description') }}</p>
            </div>
        </div>
    </div>

    <!-- Login modal overlay -->
    <div class="login-overlay">
        <div class="login-container">
            <!-- Language switcher buttons (top-right corner) -->
            <div class="language-buttons">
                <div class="btn-group btn-group-sm" role="group">
                    <button type="button" class="btn {% if lang() == 'de' %}btn-primary{% else %}btn-outline-primary{% endif %}" id="login-lang-de">DE</button>
                    <button type="button" class="btn {% if lang() == 'en' %}btn-primary{% else %}btn-outline-primary{% endif %}" id="login-lang-en">EN</button>
                </div>
            </div>
            
            <div class="login-header">
                <h1>{{ g.i18n.get('login.title') }}</h1>
                <p>{{ g.i18n.get('app.description') }}</p>
            </div>

            <div id="error-message" class="error-message" style="display: none;"></div>

            <form id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">{{ g.i18n.get('login.username_label') }}</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="{{ g.i18n.get('login.username_placeholder') }}" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">{{ g.i18n.get('login.password_label') }}</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="{{ g.i18n.get('login.password_placeholder') }}" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">{{ g.i18n.get('login.login_button') }}</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}?v={{ static_version }}"></script>
    <script>
        // Language switching - use login-specific IDs to avoid conflict with background header
        const langDe = document.getElementById('login-lang-de');
        const langEn = document.getElementById('login-lang-en');
        
        if (langDe) {
            langDe.addEventListener('click', async function() {
                try {
                    const response = await fetch('/api/language/de', { method: 'POST' });
                    if (response.ok) {
                        window.location.reload();
                    }
                } catch (error) {
                    console.error('Language switch failed:', error);
                }
            });
        }
        
        if (langEn) {
            langEn.addEventListener('click', async function() {
                try {
                    const response = await fetch('/api/language/en', { method: 'POST' });
                    if (response.ok) {
                        window.location.reload();
                    }
                } catch (error) {
                    console.error('Language switch failed:', error);
                }
            });
        }

        // Error message translations
        const errorMessages = {
            'invalid_credentials': '{{ g.i18n.get("login.error_invalid_credentials") }}',
            'username_password_required': '{{ g.i18n.get("login.error_username_password_required") }}',
            'server_unreachable': '{{ g.i18n.get("login.error_server_unreachable") }}'
        };
        
        // Login form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Redirect to main page
                    window.location.href = '/';
                } else {
                    // Show translated error message
                    errorDiv.textContent = errorMessages[data.error] || data.error;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '{{ g.i18n.get("login.error_login_failed") }}';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
