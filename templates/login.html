<!DOCTYPE html>
<html lang="{{ lang() }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HALOpy Login</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}?v={{ static_version }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}?v={{ static_version }}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }
        .language-switch {
            text-align: center;
            margin-top: 20px;
        }
        .language-switch a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }
        .language-switch a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>{{ g.i18n.get('login.title') }}</h1>
            <p>{{ g.i18n.get('app.description') }}</p>
        </div>

        <div id="error-message" class="error-message" style="display: none;"></div>

        <form id="login-form">
            <div class="mb-3">
                <label for="username" class="form-label">{{ g.i18n.get('login.username_label') }}</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="{{ g.i18n.get('login.username_placeholder') }}" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">{{ g.i18n.get('login.password_label') }}</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="{{ g.i18n.get('login.password_placeholder') }}" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login">{{ g.i18n.get('login.login_button') }}</button>
        </form>

        <div class="language-switch">
            <a href="#" onclick="switchLanguage('de'); return false;">{{ g.i18n.get('common.language_de') }}</a> |
            <a href="#" onclick="switchLanguage('en'); return false;">{{ g.i18n.get('common.language_en') }}</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}?v={{ static_version }}"></script>
    <script>
        // Language switching
        function switchLanguage(lang) {
            fetch(`/api/language/${lang}`, { method: 'POST' })
                .then(() => window.location.reload());
        }

        // Login form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Redirect to main page
                    window.location.href = '/';
                } else {
                    // Show error message
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '{{ g.i18n.get("login.error_login_failed") }}';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
